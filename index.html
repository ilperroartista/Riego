<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mis Plantas" />
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Mis Plantas</title>
  
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default"> 

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --cream: #f5f0e8;
      --cream-dark: #ede6d9;
      --cream-mid: #f0ebe0;
      --text-primary: #2c2a25;
      --text-secondary: #7a7468;
      --text-muted: #a8a299;

      /* State colors — pastel, not aggressive */
      --ok-bg: #f5f0e8;
      --ok-border: #ddd8ce;
      --ok-day-color: #5a8a6a;

      --warn-bg: #fdf6ed;
      --warn-border: #e8b87a;
      --warn-day-color: #c07830;

      --urgent-bg: #fdf0ee;
      --urgent-border: #e09088;
      --urgent-day-color: #c05040;

      --btn-bg: #2c2a25;
      --btn-text: #f5f0e8;
      --btn-hover: #44413a;

      --shadow-sm: 0 1px 3px rgba(44,42,37,0.07);
      --shadow-md: 0 4px 16px rgba(44,42,37,0.10);
      --radius: 18px;
      --radius-sm: 10px;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--cream-dark);
      padding: calc(12px + var(--safe-top)) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .app-header h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .app-header .subtitle {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* ── Summary bar ─────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .summary-bar::-webkit-scrollbar { display: none; }

    .summary-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .summary-pill.all {
      background: var(--text-primary);
      color: var(--cream);
      border-color: var(--text-primary);
    }
    .summary-pill.ok {
      background: #edf5ef;
      color: #3d7a50;
      border-color: #b8d8c0;
    }
    .summary-pill.warn {
      background: #fef3e4;
      color: #b06820;
      border-color: #e8c080;
    }
    .summary-pill.urgent {
      background: #fdecea;
      color: #b04030;
      border-color: #e0a098;
    }

    /* ── Grid ───────────────────────────────── */
    .plant-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px 14px calc(20px + var(--safe-bottom));
    }

    @media (min-width: 520px) {
      .plant-grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 640px;
        margin: 0 auto;
      }
    }

    /* ── Card ───────────────────────────────── */
    .plant-card {
      background: var(--ok-bg);
      border: 1.5px solid var(--ok-border);
      border-radius: var(--radius);
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.4s ease, background 0.4s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .plant-card.state-warn {
      background: var(--warn-bg);
      border-color: var(--warn-border);
      box-shadow: 0 2px 8px rgba(200,130,50,0.12);
    }

    .plant-card.state-urgent {
      background: var(--urgent-bg);
      border-color: var(--urgent-border);
      box-shadow: 0 2px 10px rgba(200,80,64,0.13);
    }

    /* Status dot */
    .status-dot {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b8d8c0;
      transition: background 0.4s;
    }
    .state-warn .status-dot { background: var(--warn-border); }
    .state-urgent .status-dot {
      background: var(--urgent-border);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    /* Plant image */
    .plant-img-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--cream-dark);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plant-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .plant-img-wrap .img-fallback {
      font-size: 36px;
      line-height: 1;
    }

    /* Plant name */
    .plant-name {
      font-size: 11.5px;
      font-weight: 500;
      text-align: center;
      color: var(--text-primary);
      line-height: 1.35;
      max-width: 100%;
      /* truncate to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Day counter */
    .day-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
    }

    .day-number {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      color: var(--ok-day-color);
      transition: color 0.4s;
    }

    .state-warn .day-number { color: var(--warn-day-color); }
    .state-urgent .day-number { color: var(--urgent-day-color); }

    .day-label {
      font-size: 9.5px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .freq-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* Last watered */
    .last-watered {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 300;
      text-align: center;
    }

    /* Water button */
    .water-btn {
      margin-top: 2px;
      width: 100%;
      padding: 9px 0;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    .water-btn:active {
      background: var(--btn-hover);
      transform: scale(0.97);
    }

    .water-btn .drop {
      font-size: 13px;
    }

    /* Watered flash animation */
    @keyframes flash-ok {
      0% { background: #b8d8c0; border-color: #8aba98; }
      100% { background: var(--ok-bg); border-color: var(--ok-border); }
    }

    .plant-card.just-watered {
      animation: flash-ok 0.8s ease-out forwards;
    }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-muted);
      font-size: 14px;
      grid-column: 1 / -1;
    }

    /* ── Toast ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: var(--cream);
      font-size: 13px;
      font-weight: 400;
      padding: 10px 20px;
      border-radius: 50px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Scroll reveal ───────────────────────── */
    .plant-card {
      opacity: 0;
      transform: translateY(12px);
      animation: card-in 0.35s ease forwards;
    }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <header class="app-header">
    <div>
      <h1>Mis Plantas</h1>
      <button id="btn-notif" style="padding:12px 20px; font-size:16px; margin:20px 0;">
      🔔 Activar notificaciones
      </button>
      <button id="btn-diag" style="padding:12px 20px; font-size:16px; margin:10px 0; background:#e8e0d0;">
     🔍 Probar conexión
      </button>
      <div class="subtitle">Registro de riego</div>
    </div>
    <span class="header-icon">🌿</span>
  </header>

  <div class="summary-bar" id="summaryBar"></div>

  <main class="plant-grid" id="plantGrid"></main>

  <div id="toast"></div>

  <script>
    // ── Data ──────────────────────────────────────────────
    const PLANTS = [
      { id: "001", name: "Palma abanico", fullName: "Rhapis excelsa", frequency: 14 },
      { id: "002", name: "Cactus Mammillaria", fullName: "Mammillaria elongata", frequency: 25 },
      { id: "003", name: "Kalanchoe", fullName: "Kalanchoe daigremontiana", frequency: 18 },
      { id: "004", name: "Huernia / Stapelia", fullName: "Stapelia sp.", frequency: 20 },
      { id: "005", name: "Alocasia 'Polly'", fullName: "Alocasia amazonica", frequency: 7 },
      { id: "006", name: "Zamioculca", fullName: "Zamioculcas zamiifolia", frequency: 20 },
      { id: "007", name: "Haworthia cebra", fullName: "Haworthiopsis attenuata", frequency: 20 },
      { id: "008", name: "Sansevieria", fullName: "Sansevieria sp.", frequency: 20 },
      { id: "009", name: "Sansevieria enana", fullName: "Sansevieria sp. nana", frequency: 20 },
      { id: "010", name: "Philodendron", fullName: "Philodendron trepador", frequency: 7 },
      { id: "011", name: "Pothos", fullName: "Epipremnum aureum", frequency: 10 },
      { id: "012", name: "Cactus columnar", fullName: "Cactus ornamental", frequency: 20 },
      { id: "013", name: "Kalanchoe fedtsch.", fullName: "Kalanchoe fedtschenkoi", frequency: 15 },
      { id: "014", name: "Begonia peluda", fullName: "Begonia sp.", frequency: 7 },
    ];

    const STORAGE_KEY = "mis-plantas-v1";

    // ── State ─────────────────────────────────────────────
    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = loadState();
    let filterState = "all"; // all | ok | warn | urgent

    // ── Helpers ───────────────────────────────────────────
  function daysSince(iso) {
  if (!iso) return null;
  const watered = new Date(iso);
  // Truncar ambas a medianoche LOCAL
  const wateredDay = new Date(
    watered.getFullYear(), 
    watered.getMonth(), 
    watered.getDate()
  );
  const now = new Date();
  const todayDay = new Date(
    now.getFullYear(), 
    now.getMonth(), 
    now.getDate()
  );
  return Math.round((todayDay - wateredDay) / (1000 * 60 * 60 * 24));
}

    function getCardState(days, frequency) {
      if (days === null) return "ok";
      if (days > frequency) return "urgent";
      if (days >= frequency) return "warn";
      return "ok";
    }

    function formatDate(iso) {
      if (!iso) return "Nunca regada";
      const d = new Date(iso);
      const day = d.getDate();
      const months = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
      return `${day} ${months[d.getMonth()]}`;
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      const grid = document.getElementById("plantGrid");
      grid.innerHTML = "";

      // Count states
      let counts = { ok: 0, warn: 0, urgent: 0 };
      PLANTS.forEach(p => {
        const days = daysSince(state[p.id]);
        counts[getCardState(days, p.frequency)]++;
      });
      renderSummary(counts);

      const filtered = PLANTS.filter(p => {
        if (filterState === "all") return true;
        const days = daysSince(state[p.id]);
        return getCardState(days, p.frequency) === filterState;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state">Sin plantas en esta categoría</div>`;
        return;
      }

      // Sort: urgent first, then warn, then ok
      const order = { urgent: 0, warn: 1, ok: 2 };
      filtered.sort((a, b) => {
        const da = daysSince(state[a.id]);
        const db = daysSince(state[b.id]);
        const sa = order[getCardState(da, a.frequency)];
        const sb = order[getCardState(db, b.frequency)];
        if (sa !== sb) return sa - sb;
        // within same state: sort by days desc
        return (db ?? -1) - (da ?? -1);
      });

      filtered.forEach((plant, i) => {
        const days = daysSince(state[plant.id]);
        const cardState = getCardState(days, plant.frequency);
        const lastDate = formatDate(state[plant.id]);
        const daysLeft = plant.frequency - (days ?? 0);

        const card = document.createElement("div");
        card.className = `plant-card state-${cardState}`;
        card.style.animationDelay = `${i * 40}ms`;
        card.dataset.id = plant.id;

        const daysDisplay = days === null ? "0" : String(days);
        const daysLabelText = days === 1 ? "día" : "días";

        let statusMsg = "";
        if (days === null) statusMsg = `Regar cada ${plant.frequency} días`;
        else if (cardState === "urgent") statusMsg = `${days - plant.frequency}d pasados`;
        else if (cardState === "warn") statusMsg = "¡Hoy toca regar!";
        else statusMsg = `En ${daysLeft}d`;

        card.innerHTML = `
          <div class="status-dot"></div>
          <div class="plant-img-wrap">
            <img
              src="${plant.id}.png"
              alt="${plant.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
            />
            <span class="img-fallback" style="display:none">🪴</span>
          </div>
          <div class="plant-name">${plant.name}</div>
          <div class="day-counter">
            <div class="day-number">${daysDisplay}</div>
            <div class="day-label">${daysLabelText} sin riego</div>
          </div>
          <div class="freq-label">${statusMsg}</div>
          <div class="last-watered">Último: ${lastDate}</div>
          <button class="water-btn" data-id="${plant.id}" aria-label="Regar ${plant.name}">
            <span class="drop">💧</span> Regar
          </button>
        `;

        grid.appendChild(card);
      });

      // Bind buttons
      grid.querySelectorAll(".water-btn").forEach(btn => {
        btn.addEventListener("click", handleWater);
      });
    }

    function renderSummary(counts) {
      const bar = document.getElementById("summaryBar");
      bar.innerHTML = `
        <button class="summary-pill all ${filterState === 'all' ? '' : 'inactive'}" data-filter="all">
          Todas (${PLANTS.length})
        </button>
        <button class="summary-pill ok" data-filter="ok">
          ✅ Bien (${counts.ok})
        </button>
        <button class="summary-pill warn" data-filter="warn">
          ⚠️ Hoy (${counts.warn})
        </button>
        <button class="summary-pill urgent" data-filter="urgent">
          🔴 Pasadas (${counts.urgent})
        </button>
      `;

      // Active state
      bar.querySelectorAll(".summary-pill").forEach(pill => {
        if (pill.dataset.filter === filterState) {
          pill.style.opacity = "1";
          pill.style.fontWeight = "600";
        } else {
          pill.style.opacity = "0.55";
          pill.style.fontWeight = "400";
        }
        pill.addEventListener("click", () => {
          filterState = pill.dataset.filter;
          render();
        });
      });
    }

    // ── Water action ──────────────────────────────────────
    function handleWater(e) {
      const id = e.currentTarget.dataset.id;
      const plant = PLANTS.find(p => p.id === id);
      if (!plant) return;

      // Save timestamp
      state[id] = new Date().toISOString();
      saveState(state);

      // Flash card
      const card = document.querySelector(`.plant-card[data-id="${id}"]`);
      if (card) {
        card.classList.remove("state-urgent", "state-warn");
        card.classList.add("state-ok", "just-watered");
        setTimeout(() => card.classList.remove("just-watered"), 900);
      }

      showToast(`💧 ${plant.name} regada`);
      setTimeout(render, 300);
    }

    // ── Toast ─────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
    }

    // ── Auto-refresh at midnight ──────────────────────────
    function scheduleNextDay() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(now.getDate() + 1);
      tomorrow.setHours(0, 0, 5, 0);
      const ms = tomorrow - now;
      setTimeout(() => { render(); scheduleNextDay(); }, ms);
    }

    // ── Init ──────────────────────────────────────────────
    render();
    scheduleNextDay();

    // Refresh on visibility restore (returning to app)
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) render();
    });
  </script>
  <script>
  const VAPID_PUBLIC_KEY = 'BA5A5LQ0lkVwc6NIuy3lwm_g_bjJd_VZFzXhFldW8OBif_MRADAcDatNxDSeioO4IML0nhqlxIeRPEWM6rDbmro';

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function registerPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      alert('Tu navegador no soporta notificaciones push');
      return;
    }

    try {
      const reg = await navigator.serviceWorker.register('/Riego/sw.js');
      await navigator.serviceWorker.ready;

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        alert('Permiso de notificaciones denegado. Puedes cambiarlo en Ajustes > Notificaciones.');
        return;
      }

      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }

      const plantState = JSON.parse(localStorage.getItem('mis-plantas-v1') || '{}');
      await fetch('https://plantas-server.onrender.com/ping', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: sub, plantState })
      });

      document.getElementById('btn-notif').textContent = '✅ Notificaciones activadas';
      document.getElementById('btn-notif').disabled = true;
    } catch (err) {
      console.error('Error al registrar push:', err);
      alert('Hubo un error: ' + err.message);
    }
  }

  document.getElementById('btn-notif').addEventListener('click', registerPush);
  document.getElementById('btn-diag').addEventListener('click', async () => {
  try {
    const res = await fetch('https://plantas-server.onrender.com/ping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: { endpoint: 'test-diag' }, plantState: {} })
    });
    const json = await res.json();
    alert('Éxito: ' + JSON.stringify(json));
  } catch (e) {
    alert('Error: ' + e.message);
  }
});
</script>
</body>
</html>
